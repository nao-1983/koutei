<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>現場工程表</title>
<meta name="theme-color" content="#16233A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="工程表">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>

<style>
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0}
  #root{min-height:100vh}
  .kt{
    --ink:#16233A; --ink2:#4A5870; --paper:#F3F2EC; --line:#D8D8CD; --line2:#EAE9E0;
    --sat:#EDF1F7; --sun:#F7EDEE; --red:#C8102E; --band:#F0F0E8;
    font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    color:var(--ink); background:var(--paper); min-height:100vh;
    padding:18px 16px calc(40px + env(safe-area-inset-bottom));
    background-image:linear-gradient(var(--line2) 1px,transparent 1px),linear-gradient(90deg,var(--line2) 1px,transparent 1px);
    background-size:22px 22px;
    -webkit-tap-highlight-color:rgba(200,16,46,.12);
  }
  .kt *{box-sizing:border-box}
  .kt input,.kt button,.kt textarea,.kt select{font-family:inherit; -webkit-appearance:none; appearance:none; border-radius:0}
  .kt :focus-visible{outline:2px solid var(--red); outline-offset:1px}

  .kt-sheet{background:var(--paper); padding:2px}
  .kt-head{border-bottom:3px double var(--ink); padding-bottom:12px; margin-bottom:14px; display:flex; gap:20px; align-items:flex-end}
  .kt-headmain{flex:1; min-width:0}
  .kt-eyebrow{font-size:12px; font-weight:900; letter-spacing:.35em; color:var(--ink2)}

  /* 表題欄 */
  .kt-title-block{flex:none; width:270px; border:1.5px solid var(--ink); background:#fff}
  .kt-tb-row{display:flex; align-items:stretch; border-bottom:1px solid var(--line)}
  .kt-tb-row:last-child{border-bottom:0}
  .kt-tb-label{flex:none; width:74px; background:var(--band); border-right:1px solid var(--line); display:flex; align-items:center; padding:0 8px; font-size:11px; font-weight:900; letter-spacing:.12em; color:var(--ink2)}
  .kt-tb-row input{flex:1; min-width:0; border:0; background:transparent; padding:9px 8px; font-size:15px; font-weight:700; color:var(--ink); min-height:40px}
  .kt-tb-row input[type=date]{font-family:'Roboto Mono',monospace; font-weight:500; border:0; border-radius:0}
  .kt-tb-row input::placeholder{color:#C2C2B6; font-weight:400}
  .kt-tb-val{flex:1; min-width:0; padding:9px 8px; font-size:14px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .kt-tb-val.mono{font-family:'Roboto Mono',monospace; font-weight:500}

  .kt-toggles{display:flex; gap:14px; flex-wrap:wrap; align-items:center}
  .kt-eyebrow span{font-family:'Roboto Mono',monospace; font-weight:500; letter-spacing:.14em; font-size:10px; margin-left:8px; opacity:.65}
  .kt-site{display:block; width:100%; margin:4px 0 10px; padding:2px 0; font-size:30px; font-weight:900; letter-spacing:.02em; line-height:1.25; border:0; border-bottom:2px solid var(--ink); background:transparent; color:var(--ink)}
  .kt-site::placeholder{color:#B4B4A8; font-weight:700}
  .kt-period{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:13px; font-weight:700; color:var(--ink2)}
  .kt-period label{display:flex; align-items:center; gap:6px}
  .kt input[type=date]{font-family:'Roboto Mono',monospace; font-size:16px; font-weight:500; color:var(--ink); border:1px solid var(--line); background:#fff; border-radius:2px; padding:6px 8px; min-height:34px}
  .kt-tilde{color:var(--ink2)}
  .kt-total{margin-left:auto; font-family:'Roboto Mono',monospace; font-size:11px; letter-spacing:.08em; background:var(--ink); color:var(--paper); padding:5px 9px; border-radius:2px}

  /* 追加フォーム */
  .kt-add{margin-bottom:16px; padding:12px; background:#fff; border:1px solid var(--line); border-radius:3px}
  .kt-kind{display:flex; gap:0; margin-bottom:10px; border:1.5px solid var(--ink); border-radius:2px; overflow:hidden; width:fit-content}
  .kt-kind button{background:#fff; color:var(--ink); border:0; padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; min-height:40px}
  .kt-kind button.on{background:var(--ink); color:#fff}
  .kt-fields{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
  .kt-name{flex:1 1 200px; min-width:0; border:0; border-bottom:1.5px solid var(--ink); background:transparent; font-size:17px; font-weight:700; padding:8px 2px; color:var(--ink)}
  .kt-notein{flex:1 1 170px; min-width:0; border:0; border-bottom:1px solid var(--line); background:transparent; font-size:16px; padding:8px 2px; color:var(--ink)}
  .kt-name::placeholder,.kt-notein::placeholder{color:#B4B4A8; font-weight:400}
  .kt-dates{display:flex; align-items:center; gap:6px}
  .kt-swatches{display:flex; gap:8px}
  .kt-sw{width:32px; height:32px; border:2px solid transparent; border-radius:50%; cursor:pointer; padding:0; box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
  .kt-sw.on{border-color:var(--ink); transform:scale(1.1)}
  .kt-btn{background:var(--ink); color:#fff; border:0; border-radius:2px; padding:12px 20px; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:.05em; min-height:44px}
  .kt-btn:hover{background:#0D1626}
  .kt-hint{font-size:12px; color:var(--ink2); margin-top:8px; line-height:1.6}

  /* 表 */
  .kt-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; border:1.5px solid var(--ink); background:#fff; border-radius:3px}
  .kt-grid{position:relative; min-width:100%}
  .kt-row{display:flex; align-items:stretch}
  .kt-cell-head{position:sticky; left:0; z-index:5; width:var(--head); min-width:var(--head); background:#fff; border-bottom:1px solid var(--line); border-right:1.5px solid var(--ink); display:flex; align-items:center; gap:6px; padding:6px 4px 6px 8px}
  .kt-cell-head.has-note{border-right:0}
  .kt-cell-note{position:sticky; left:var(--head); z-index:5; width:var(--notew); min-width:var(--notew); background:#fff; border-left:1px dashed var(--line); border-right:1.5px solid var(--ink); border-bottom:1px solid var(--line); padding:5px; display:flex; align-items:center}

  .kt-corner,.kt-corner2{background:var(--ink); color:var(--paper); font-size:11px; font-weight:900; letter-spacing:.2em; border-bottom-color:rgba(255,255,255,.25)}
  .kt-corner2{letter-spacing:.1em; font-size:10px}
  .kt-corner-note{border-left-color:rgba(255,255,255,.3); border-right-color:var(--ink)}

  .kt-month{background:var(--ink); color:var(--paper); border-left:1px solid rgba(255,255,255,.3); font-family:'Roboto Mono',monospace; font-size:11px; font-weight:500; letter-spacing:.06em; display:flex; align-items:center; padding:7px 8px; white-space:nowrap; overflow:hidden}
  .kt-day{width:var(--cell); min-width:var(--cell); border-right:1px solid var(--line2); border-bottom:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px 0; background:#fff}
  .kt-day b{font-family:'Roboto Mono',monospace; font-size:12px; font-weight:700; line-height:1.1}
  .kt-day i{font-style:normal; font-size:9px; color:var(--ink2); line-height:1.3}
  .kt-day.sat{background:var(--sat)} .kt-day.sat i{color:#215FA6}
  .kt-day.sun{background:var(--sun)} .kt-day.sun i{color:var(--red)}
  .kt-day.now b{background:var(--red); color:#fff; border-radius:2px; padding:0 3px}
  .kt-wide .kt-day b{font-size:20px} .kt-wide .kt-day i{font-size:12px; margin-top:2px}

  .kt-track{position:relative; display:flex; flex:1}
  .kt-tick{width:var(--cell); min-width:var(--cell); border-right:1px solid var(--line2); border-bottom:1px solid var(--line)}
  .kt-tick.sat{background:var(--sat)} .kt-tick.sun{background:var(--sun)}

  /* PDF出力範囲の設定 */
  .kt-pdfset{margin-top:12px; padding:10px 12px; background:#fff; border:1px solid var(--line); border-radius:3px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; font-size:13px; font-weight:700; color:var(--ink2)}
  .kt-pdfset select, .kt-pdfset input{border:1px solid var(--line); background:#fff; border-radius:2px; padding:7px 8px; font-size:16px; color:var(--ink); min-height:38px}
  .kt-pdfset select{-webkit-appearance:menulist; appearance:menulist; font-weight:700}
  .kt-range{margin-left:auto; font-family:'Roboto Mono',monospace; font-size:12px; font-weight:500; color:var(--ink); background:var(--band); border:1px solid var(--line); padding:6px 10px; border-radius:2px}

  /* 大枠(工種) */
  .kt-grp{min-height:var(--grouph)}
  .kt-grp .kt-cell-head,.kt-grp .kt-cell-note{background:var(--band); border-bottom:1px solid var(--line)}
  .kt-grp .kt-tick{background:rgba(22,35,58,.045)}
  .kt-grp .kt-tick.sat{background:rgba(33,95,166,.07)}
  .kt-grp .kt-tick.sun{background:rgba(200,16,46,.06)}
  .kt-caret{border:0; background:transparent; color:var(--ink); font-size:13px; cursor:pointer; padding:4px 2px; flex:none; width:22px; line-height:1}
  .kt-gname{flex:1; min-width:0; border:0; background:transparent; font-size:16px; font-weight:900; letter-spacing:.04em; color:var(--ink); padding:2px 0}
  .kt-gname-s{flex:1; min-width:0; font-size:15px; font-weight:900; letter-spacing:.04em; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .kt-count-badge{font-family:'Roboto Mono',monospace; font-size:10px; color:var(--ink2); flex:none}
  .kt-gbar{position:absolute; top:50%; transform:translateY(-50%); height:var(--gbarh); background:var(--ink); z-index:2}
  .kt-gbar::before,.kt-gbar::after{content:""; position:absolute; width:3px; height:calc(var(--pbarh) + 4px); top:calc((var(--gbarh) - var(--pbarh) - 4px) / 2); background:var(--ink)}
  .kt-gbar::before{left:0} .kt-gbar::after{right:0}
  .kt-gbar span{position:absolute; right:0; top:-15px; font-family:'Roboto Mono',monospace; font-size:9px; font-weight:700; color:var(--ink); white-space:nowrap}

  /* 詳細項目 */
  .kt-item{min-height:var(--rowh)}
  .kt-item .kt-cell-head{padding-left:26px}
  .kt-item.child .kt-cell-head{padding-left:26px; background:linear-gradient(90deg,var(--ink) 0 2px,#fff 2px)}
  .kt-dot{width:20px; height:20px; border-radius:3px; border:0; cursor:pointer; flex:none; box-shadow:inset 0 0 0 1px rgba(0,0,0,.18)}
  .kt-headinner{flex:1; min-width:0}
  .kt-itemname{width:100%; border:0; background:transparent; font-size:15px; font-weight:700; color:var(--ink); padding:2px 0}
  .kt-itemname-s{font-size:14px; font-weight:700; color:var(--ink); line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .kt-itemdates{display:flex; flex-direction:var(--datedir); gap:4px; margin-top:3px}
  .kt-itemdates input{font-size:var(--datefs); padding:3px 5px; width:var(--datew); min-height:0; border-color:var(--line2); color:var(--ink2)}

  .kt-tools{display:flex; flex-direction:column; gap:1px; flex:none}
  .kt-tool{border:0; background:transparent; color:#A9AFB8; font-size:12px; line-height:1; cursor:pointer; padding:4px 3px; min-width:22px}
  .kt-tool:hover{color:var(--ink)}
  .kt-tool.del{color:#C7C7BB; font-size:18px}
  .kt-tool.del:hover{color:var(--red)}
  .kt-tool:disabled{opacity:.25; cursor:default}

  .kt-note{width:100%; border:0; background:transparent; resize:none; font-size:var(--notefs); line-height:1.5; color:var(--ink2); padding:2px; overflow:auto}
  .kt-note::placeholder{color:#C8C8BC}
  .kt-note-s{font-size:10px; line-height:1.5; color:var(--ink); word-break:break-all}

  .kt-bar{position:absolute; top:50%; transform:translateY(-50%); height:var(--pbarh); border-radius:2px; z-index:2; display:flex; align-items:center; justify-content:flex-end; padding-right:5px; box-shadow:0 1px 0 rgba(0,0,0,.18)}
  .kt-bar span{font-family:'Roboto Mono',monospace; font-size:9px; font-weight:700; color:#fff; opacity:.9; white-space:nowrap}
  .kt-bar.cutl{clip-path:polygon(6px 0,100% 0,100% 100%,6px 100%,0 50%)}
  .kt-bar.cutr{clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%)}

  .kt-todayline{position:absolute; top:0; bottom:0; width:2px; background:var(--red); z-index:3; pointer-events:none}
  .kt-todayline span{position:absolute; top:0; left:-16px; width:34px; text-align:center; font-size:9px; font-weight:700; color:#fff; background:var(--red); padding:1px 0}

  .kt-empty{padding:26px 18px; font-size:14px; color:var(--ink2); line-height:1.8; position:sticky; left:0; max-width:560px}

  .kt-foot{display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-top:14px; font-size:13px; color:var(--ink2)}
  .kt-count{font-family:'Roboto Mono',monospace; font-weight:700; color:var(--ink)}
  .kt-pdf{background:var(--red); color:#fff; border:0; border-radius:2px; padding:11px 18px; font-size:13px; font-weight:700; letter-spacing:.05em; cursor:pointer; min-height:44px}
  .kt-pdf:disabled{background:#D6D6CC; color:#fff; cursor:default}
  .kt-toggle{display:flex; align-items:center; gap:6px; font-weight:700; color:var(--ink); cursor:pointer; padding:6px 0}
  .kt-toggle input{width:20px; height:20px; -webkit-appearance:checkbox; appearance:checkbox}
  .kt-link{background:none; border:0; padding:6px 0; font-size:13px; font-weight:700; color:var(--ink); cursor:pointer; border-bottom:1.5px solid var(--ink)}
  .kt-link:disabled{color:#B4B4A8; border-color:#DCDCD2; cursor:default}
  .kt-link.danger{color:var(--red); border-color:var(--red)}
  .kt-status{margin-left:auto; font-size:11px; letter-spacing:.06em}

  /* PDF出力時 */
  .kt-sheet.printing{background:#fff}
  .kt-sheet.printing .kt-scroll{overflow:visible}
  .kt-sheet.printing .kt-item{min-height:var(--prowh)}
  .kt-sheet.printing .kt-grp{min-height:var(--pgrouph)}
  .kt-site-s{display:block; width:100%; margin:6px 0 12px; padding:0 0 8px; font-size:28px; font-weight:900; line-height:1.4; border-bottom:2px solid var(--ink); color:var(--ink); white-space:nowrap; overflow:hidden}
  .kt-date-s{font-family:'Roboto Mono',monospace; font-size:14px; font-weight:500; color:var(--ink); padding:0 2px}
  .kt-madeon{text-align:right; font-family:'Roboto Mono',monospace; font-size:10px; color:var(--ink2); padding:6px 2px 0}

  @media (max-width:820px){
    .kt-head{flex-direction:column; align-items:stretch}
    .kt-title-block{width:100%}
  }
  @media (max-width:640px){
    .kt{padding:14px 10px 30px}
    .kt-site{font-size:22px}
    .kt-btn{width:100%}
  }
  @media print{
    .kt{background:#fff; padding:0}
    .kt-add,.kt-foot{display:none}
    .kt-scroll{overflow:visible}
    @page{size:A4 landscape; margin:8mm}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const TOUCH = window.matchMedia("(pointer: coarse)").matches;
const HEAD = TOUCH ? 230 : 205;
const NOTE = TOUCH ? 170 : 150;
const VARS = TOUCH
  ? { "--head":HEAD+"px", "--notew":NOTE+"px", "--rowh":"92px", "--grouph":"46px", "--datedir":"column", "--datew":"150px", "--datefs":"16px", "--notefs":"16px" }
  : { "--head":HEAD+"px", "--notew":NOTE+"px", "--rowh":"56px", "--grouph":"40px", "--datedir":"row", "--datew":"88px", "--datefs":"11px", "--notefs":"11px" };

const KEY = "koutei:v1";
const PALETTE = [
  { name:"赤", v:"#C8102E" }, { name:"黄赤", v:"#E8590C" }, { name:"黄", v:"#E3A008" },
  { name:"緑", v:"#12855B" }, { name:"青", v:"#215FA6" }, { name:"紫", v:"#6B4A9E" },
];
const WD = ["日","月","火","水","木","金","土"];
const pad = n => String(n).padStart(2,"0");
const toStr = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const parse = s => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const addDays = (s,n) => { const d = parse(s); d.setDate(d.getDate()+n); return toStr(d); };
const diff = (a,b) => Math.round((parse(b) - parse(a)) / 86400000);
/* その日を含む週の月曜 */
const mondayOf = s => { const d = parse(s); const w = (d.getDay() + 6) % 7; d.setDate(d.getDate() - w); return toStr(d); };
const monthFirst = s => s.slice(0,7) + "-01";
const monthLast = s => { const d = parse(s); return toStr(new Date(d.getFullYear(), d.getMonth() + 1, 0)); };

const today = toStr(new Date());
const defaultStart = toStr(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
const defaultEnd = addDays(defaultStart, 44);
let seq = 1;
const uid = () => "k" + Date.now() + (seq++);

const H2C = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
const JSPDF = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
const loadScript = src => new Promise((res, rej) => {
  if (document.querySelector('script[src="' + src + '"]')) return res();
  const s = document.createElement("script");
  s.src = src; s.onload = () => res(); s.onerror = () => rej(new Error(src));
  document.head.appendChild(s);
});

/* 行データ:kind = "group"(大枠/工種) または "task"(詳細項目)。
   task は、すぐ上にある group に属する。 */
function KouteiHyou() {
  const [site, setSite] = useState("");
  const [start, setStart] = useState(defaultStart);
  const [end, setEnd] = useState(defaultEnd);
  const [rows, setRows] = useState([]);
  const [showNote, setShowNote] = useState(true);
  const [meta, setMeta] = useState({ date: today, author: "", company: "" });
  const [show, setShow] = useState({ date: true, author: true, company: true });
  const [range, setRange] = useState({ mode:"auto", week:"", month:"", from:"", to:"" });
  const [kind, setKind] = useState("task");
  const [draft, setDraft] = useState({ name:"", start:defaultStart, end:addDays(defaultStart,4), color:PALETTE[4].v, note:"" });
  const [status, setStatus] = useState("");
  const [busy, setBusy] = useState("");
  const [printing, setPrinting] = useState(false);
  const [pv, setPv] = useState({});   /* PDF用に自動計算した行高・列幅 */
  const sheetRef = useRef(null);
  const loaded = useRef(false);
  const fileRef = useRef(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const s = JSON.parse(raw);
        setSite(s.site || "");
        setStart(s.start || defaultStart);
        setEnd(s.end || defaultEnd);
        if (s.rows) setRows(s.rows);
        else if (s.items) /* 旧データを詳細項目として引き継ぐ */
          setRows(s.items.map(it => Object.assign({ kind:"task", note:"" }, it)));
        if (typeof s.showNote === "boolean") setShowNote(s.showNote);
        if (s.meta) setMeta(Object.assign({ date: today, author:"", company:"" }, s.meta));
        if (s.show) setShow(Object.assign({ date:true, author:true, company:true }, s.show));
      }
    } catch (e) {}
    loaded.current = true;
    const t = setTimeout(() => {
      if (navigator.onLine) { loadScript(H2C).catch(()=>{}); loadScript(JSPDF).catch(()=>{}); }
    }, 3000);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    if (!loaded.current) return;
    setStatus("保存中");
    const t = setTimeout(() => {
      try {
        localStorage.setItem(KEY, JSON.stringify({ site, start, end, rows, showNote, meta, show, range }));
        setStatus("保存済み");
      } catch (e) { setStatus("保存できません"); }
    }, 500);
    return () => clearTimeout(t);
  }, [site, start, end, rows, showNote, meta, show, range]);

  const tasks = rows.filter(r => r.kind === "task");
  const groups = rows.filter(r => r.kind === "group");

  /* 工事項目全体の実際の期間 */
  const tMin = tasks.length ? tasks.reduce((a,b) => b.start < a ? b.start : a, tasks[0].start) : start;
  const tMax = tasks.length ? tasks.reduce((a,b) => b.end > a ? b.end : a, tasks[0].end) : end;

  /* PDFに載せる期間を決める */
  const view = useMemo(() => {
    const clamp = (a,b) => (diff(a,b) < 0 || diff(a,b) > 400) ? { from:start, to:end, label:"工期全体" } : { from:a, to:b };
    if (range.mode === "week") {
      const w = mondayOf(range.week || tMin);
      return Object.assign(clamp(w, addDays(w, 6)), { label:"週間工程" });
    }
    if (range.mode === "month") {
      const base = (range.month ? range.month + "-01" : monthFirst(tMin));
      return Object.assign(clamp(monthFirst(base), monthLast(base)), { label:"月間工程" });
    }
    if (range.mode === "custom" && range.from && range.to) {
      return Object.assign(clamp(range.from, range.to), { label:"期間指定" });
    }
    if (range.mode === "full") return { from:start, to:end, label:"工期全体" };
    /* 自動 */
    if (!tasks.length) return { from:start, to:end, label:"工期全体" };
    const w = mondayOf(tMin);
    if (diff(w, tMax) <= 6) return { from:w, to:addDays(w, 6), label:"週間工程(自動)" };
    if (tMin.slice(0,7) === tMax.slice(0,7)) return { from:monthFirst(tMin), to:monthLast(tMin), label:"月間工程(自動)" };
    return { from:start, to:end, label:"工期全体(自動)" };
  }, [range, tasks.length, tMin, tMax, start, end]);

  /* 画面は工期全体、PDF出力時だけ上の範囲で描く */
  const viewStart = printing ? view.from : start;
  const viewEnd = printing ? view.to : end;

  const days = useMemo(() => {
    const n = diff(viewStart, viewEnd);
    if (n < 0 || n > 400) return [];
    return Array.from({ length: n + 1 }, (_, i) => {
      const s = addDays(viewStart, i), d = parse(s);
      return { s, d, dow: d.getDay(), day: d.getDate(), ym: d.getFullYear() + "-" + d.getMonth() };
    });
  }, [viewStart, viewEnd]);

  /* 日数が少ないときは列幅を広げる(週間工程を見やすく) */
  const autoCell = days.length <= 8 ? 84 : days.length <= 16 ? 54 : 34;
  const cellW = (printing && pv.cell) ? pv.cell : autoCell;

  /* バーの高さ(PDFでは行高に合わせて太くする) */
  const barH = printing && pv.rowh ? Math.min(30, Math.round(pv.rowh * 0.32)) : 16;

  const months = useMemo(() => {
    const g = [];
    days.forEach(x => {
      const last = g[g.length - 1];
      if (last && last.ym === x.ym) last.span++;
      else g.push({ ym: x.ym, span: 1, label: x.d.getFullYear() + "年 " + (x.d.getMonth() + 1) + "月" });
    });
    return g;
  }, [days]);

  /* 各大枠の配下(直後から次の大枠まで)を集計 */
  const summary = useMemo(() => {
    const map = {};
    rows.forEach((r, i) => {
      if (r.kind !== "group") return;
      const kids = [];
      for (let j = i + 1; j < rows.length && rows[j].kind !== "group"; j++) kids.push(rows[j]);
      if (kids.length) {
        map[r.id] = {
          n: kids.length,
          start: kids.reduce((a,b) => b.start < a ? b.start : a, kids[0].start),
          end: kids.reduce((a,b) => b.end > a ? b.end : a, kids[0].end),
        };
      } else map[r.id] = { n: 0 };
    });
    return map;
  }, [rows]);

  /* 折りたたみ中の大枠に属する行を隠す */
  const visible = useMemo(() => {
    const out = [];
    let hide = false, inGroup = false;
    rows.forEach(r => {
      if (r.kind === "group") { hide = !!r.collapsed; inGroup = true; out.push({ r, child:false }); }
      else if (!hide) out.push({ r, child: inGroup });
    });
    return out;
  }, [rows]);

  const headW = HEAD + (showNote ? NOTE : 0);
  const todayIdx = days.findIndex(x => x.s === today);
  const totalDays = diff(start, end) + 1;

  const add = () => {
    const name = draft.name.trim();
    if (!name) return;
    if (kind === "group") {
      setRows(rows.concat([{ id: uid(), kind:"group", name, note: draft.note.trim(), collapsed:false }]));
      setDraft(Object.assign({}, draft, { name:"", note:"" }));
      return;
    }
    const s = draft.start <= draft.end ? draft.start : draft.end;
    const e = draft.start <= draft.end ? draft.end : draft.start;
    setRows(rows.concat([{ id: uid(), kind:"task", name, start:s, end:e, color:draft.color, note:draft.note.trim() }]));
    const next = PALETTE[(PALETTE.findIndex(p => p.v === draft.color) + 1) % PALETTE.length].v;
    setDraft({ name:"", start:s, end:e, color:next, note:"" });
  };

  const patch = (id, k, v) => setRows(rows.map(r => r.id === id ? Object.assign({}, r, { [k]: v }) : r));
  const remove = id => {
    const i = rows.findIndex(r => r.id === id);
    if (i < 0) return;
    if (rows[i].kind === "group") {
      let n = 1;
      while (i + n < rows.length && rows[i + n].kind !== "group") n++;
      if (n > 1 && !window.confirm("この大枠と、その中の詳細項目 " + (n - 1) + " 件を削除します。よろしいですか。")) return;
      setRows(rows.slice(0, i).concat(rows.slice(i + n)));
    } else {
      setRows(rows.filter(r => r.id !== id));
    }
  };
  const cycle = r => patch(r.id, "color", PALETTE[(PALETTE.findIndex(p => p.v === r.color) + 1) % PALETTE.length].v);

  /* 並び替え。大枠は配下ごと動かす */
  const blockAt = i => {
    if (rows[i].kind !== "group") return 1;
    let n = 1;
    while (i + n < rows.length && rows[i + n].kind !== "group") n++;
    return n;
  };
  const move = (id, dir) => {
    const i = rows.findIndex(r => r.id === id);
    if (i < 0) return;
    const len = blockAt(i);
    const block = rows.slice(i, i + len);
    const rest = rows.slice(0, i).concat(rows.slice(i + len));
    let at;
    if (dir < 0) {
      if (i === 0) return;
      let j = i - 1;
      if (rows[j].kind === "task") {
        // 直前が詳細なら、その所属大枠の先頭より前には出さない
        at = j;
      } else {
        let k = j;
        while (k > 0 && rows[k - 1].kind === "task") k--;
        at = rows[k].kind === "group" ? k : j;
        at = k;
      }
      setRows(rest.slice(0, at).concat(block, rest.slice(at)));
    } else {
      if (i + len >= rows.length) return;
      const nextLen = rows[i + len].kind === "group" ? blockAt(i + len) : 1;
      at = i + nextLen;
      setRows(rest.slice(0, at).concat(block, rest.slice(at)));
    }
  };

  const fitPeriod = () => {
    if (!tasks.length) return;
    setStart(tasks.reduce((a,b) => b.start < a ? b.start : a, tasks[0].start));
    setEnd(tasks.reduce((a,b) => b.end > a ? b.end : a, tasks[0].end));
  };
  const clearAll = () => {
    if (rows.length && !window.confirm("すべての行を削除します。よろしいですか。")) return;
    setRows([]);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ site, start, end, rows, showNote, meta, show }, null, 2)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (site.trim() || "工程表") + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  };
  const importJSON = e => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const s = JSON.parse(r.result);
        setSite(s.site || "");
        setStart(s.start || defaultStart);
        setEnd(s.end || defaultEnd);
        setRows(s.rows || (s.items || []).map(it => Object.assign({ kind:"task", note:"" }, it)));
        if (s.meta) setMeta(Object.assign({ date: today, author:"", company:"" }, s.meta));
        if (s.show) setShow(Object.assign({ date:true, author:true, company:true }, s.show));
      } catch (err) { window.alert("このファイルは読み込めません。書き出したJSONを選んでください。"); }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  const exportPDF = async () => {
    if (!rows.length || busy) return;
    setBusy("PDFを作成中");
    setPv({});
    setPrinting(true);
    await new Promise(r => setTimeout(r, 140));
    const node = sheetRef.current;
    node.classList.add("printing");

    /* A4横(余白8mm)の中身の比率に、表の縦横比を寄せる */
    const PW = 297, PH = 210, M = 8;
    const RATIO = (PW - M * 2) / (PH - M * 2);   /* ≒1.45 */
    try {
      await new Promise(r => setTimeout(r, 60));
      const W = node.scrollWidth, H = node.scrollHeight;
      const n = Math.max(visible.length, 1);
      if (W / H > RATIO) {
        /* 横長すぎる → 行を高くして紙の縦を埋める */
        const extra = Math.max(0, W / RATIO - H);
        setPv({ rowh: Math.min(130, 42 + extra / n) });
      } else if (days.length) {
        /* 縦長すぎる → 列を広げて紙の横を埋める */
        const room = H * RATIO - headW;
        setPv({ cell: Math.max(autoCell, Math.min(110, room / days.length)) });
      }
      await new Promise(r => setTimeout(r, 140));

      await loadScript(H2C);
      await loadScript(JSPDF);
      const canvas = await window.html2canvas(node, {
        scale: 2, backgroundColor: "#FFFFFF",
        width: node.scrollWidth, height: node.scrollHeight, windowWidth: node.scrollWidth + 40
      });
      const jsPDF = window.jspdf.jsPDF;
      const pdf = new jsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
      const r = Math.min((PW - M*2) / canvas.width, (PH - M*2) / canvas.height);
      const w = canvas.width * r, h = canvas.height * r;
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", (PW - w) / 2, (PH - h) / 2, w, h);
      pdf.save((site.trim() || "工程表").replace(/[\\/:*?"<>|]/g, "_") + "_工程表_" + today + ".pdf");
      setBusy("");
    } catch (err) {
      setBusy("");
      window.alert("PDFライブラリを読み込めませんでした。印刷画面を開きます。「PDFに保存」または共有から保存してください。");
      window.print();
    } finally {
      node.classList.remove("printing");
      setPrinting(false);
      setPv({});
    }
  };

  const span = (s0, e0) => {
    const n = days.length;
    const s = diff(viewStart, s0), e = diff(viewStart, e0);
    if (e < 0 || s > n - 1) return null;
    const from = Math.max(0, s), to = Math.min(n - 1, e);
    return { left: from*cellW + 3, width: (to - from + 1)*cellW - 6, cutL: s < 0, cutR: e > n - 1, len: e - s + 1 };
  };

  return (
    <div className={"kt" + (cellW >= 54 ? " kt-wide" : "")} style={Object.assign({}, VARS, {
      "--cell": cellW + "px",
      "--pbarh": barH + "px",
      "--gbarh": Math.round(barH * 0.5) + "px",
      "--prowh": (pv.rowh ? Math.round(pv.rowh) : 42) + "px",
      "--pgrouph": (pv.rowh ? Math.round(pv.rowh * 0.8) : 38) + "px",
    })}>
      <div className="kt-add">
        <div className="kt-kind">
          <button type="button" className={kind === "group" ? "on" : ""} onClick={() => setKind("group")}>大枠(工種)</button>
          <button type="button" className={kind === "task" ? "on" : ""} onClick={() => setKind("task")}>詳細項目</button>
        </div>
        <div className="kt-fields">
          <input className="kt-name" value={draft.name}
            placeholder={kind === "group" ? "大枠の名称(例:電気設備工事)" : "詳細項目(例:配管・配線)"}
            onChange={e => setDraft(Object.assign({}, draft, { name: e.target.value }))}
            onKeyDown={e => e.key === "Enter" && add()} />
          <input className="kt-notein" value={draft.note} placeholder="備考(業者・数量など)"
            onChange={e => setDraft(Object.assign({}, draft, { note: e.target.value }))}
            onKeyDown={e => e.key === "Enter" && add()} />
          {kind === "task" && (
            <React.Fragment>
              <div className="kt-dates">
                <input type="date" value={draft.start} onChange={e => setDraft(Object.assign({}, draft, { start: e.target.value }))} />
                <span className="kt-tilde">〜</span>
                <input type="date" value={draft.end} onChange={e => setDraft(Object.assign({}, draft, { end: e.target.value }))} />
              </div>
              <div className="kt-swatches">
                {PALETTE.map(p => (
                  <button key={p.v} type="button" title={p.name} aria-label={p.name}
                    className={"kt-sw" + (draft.color === p.v ? " on" : "")} style={{ background: p.v }}
                    onClick={() => setDraft(Object.assign({}, draft, { color: p.v }))} />
                ))}
              </div>
            </React.Fragment>
          )}
          <button type="button" className="kt-btn" onClick={add}>{kind === "group" ? "大枠を追加" : "詳細項目を追加"}</button>
        </div>
        <div className="kt-hint">
          {kind === "group"
            ? "大枠(工種)には日付を入れません。すぐ下に並べた詳細項目の期間から、まとめ線が自動で引かれます。"
            : "詳細項目は、すぐ上にある大枠の中に入ります。↑↓ボタンで並べ替えできます。"}
        </div>
      </div>

      <div className="kt-sheet" ref={sheetRef}>
        <header className="kt-head">
          <div className="kt-headmain">
            <div className="kt-eyebrow">工 程 表 <span>SITE SCHEDULE</span></div>
            {printing
              ? <div className="kt-site-s">{site.trim() || "現場名称"}</div>
              : <input className="kt-site" value={site} onChange={e => setSite(e.target.value)} placeholder="現場名称を入力" />}
            <div className="kt-period">
              {printing ? (
                <React.Fragment>
                  <span>着工</span><span className="kt-date-s">{start}</span>
                  <span className="kt-tilde">〜</span>
                  <span>竣工</span><span className="kt-date-s">{end}</span>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <label>着工<input type="date" value={start} onChange={e => setStart(e.target.value)} /></label>
                  <span className="kt-tilde">〜</span>
                  <label>竣工<input type="date" value={end} onChange={e => setEnd(e.target.value)} /></label>
                </React.Fragment>
              )}
              <span className="kt-total">{totalDays > 0 ? "工期 " + totalDays + "日" : "期間が正しくありません"}</span>
            </div>
          </div>

          {(show.company || show.author || show.date) && (
            <div className="kt-title-block">
              {show.company && (
                <div className="kt-tb-row">
                  <div className="kt-tb-label">作成会社</div>
                  {printing
                    ? <div className="kt-tb-val">{meta.company}</div>
                    : <input value={meta.company} placeholder="会社名"
                        onChange={e => setMeta(Object.assign({}, meta, { company: e.target.value }))} />}
                </div>
              )}
              {show.author && (
                <div className="kt-tb-row">
                  <div className="kt-tb-label">作 成 者</div>
                  {printing
                    ? <div className="kt-tb-val">{meta.author}</div>
                    : <input value={meta.author} placeholder="担当者名"
                        onChange={e => setMeta(Object.assign({}, meta, { author: e.target.value }))} />}
                </div>
              )}
              {show.date && (
                <div className="kt-tb-row">
                  <div className="kt-tb-label">作 成 日</div>
                  {printing
                    ? <div className="kt-tb-val mono">{meta.date}</div>
                    : <input type="date" value={meta.date}
                        onChange={e => setMeta(Object.assign({}, meta, { date: e.target.value }))} />}
                </div>
              )}
            </div>
          )}
        </header>

        <div className="kt-scroll">
          <div className="kt-grid" style={{ width: headW + days.length * cellW }}>
            <div className="kt-row">
              <div className={"kt-cell-head kt-corner" + (showNote ? " has-note" : "")}>工 事 項 目</div>
              {showNote && <div className="kt-cell-note kt-corner kt-corner-note">備 考</div>}
              {months.map(m => <div key={m.ym} className="kt-month" style={{ width: m.span * cellW }}>{m.label}</div>)}
            </div>

            <div className="kt-row">
              <div className={"kt-cell-head kt-corner2" + (showNote ? " has-note" : "")}>期間</div>
              {showNote && <div className="kt-cell-note kt-corner2 kt-corner-note"></div>}
              {days.map(x => (
                <div key={x.s} className={"kt-day" + (x.dow === 0 ? " sun" : x.dow === 6 ? " sat" : "") + (x.s === today && !printing ? " now" : "")}>
                  <b>{x.day}</b><i>{WD[x.dow]}</i>
                </div>
              ))}
            </div>

            {todayIdx >= 0 && rows.length > 0 && !printing && (
              <div className="kt-todayline" style={{ left: headW + todayIdx * cellW + cellW / 2 }}><span>本日</span></div>
            )}

            {visible.map(({ r, child }) => {
              const isGroup = r.kind === "group";
              const sm = isGroup ? summary[r.id] : null;
              const b = isGroup
                ? (sm && sm.n ? span(sm.start, sm.end) : null)
                : span(r.start, r.end);

              return (
                <div key={r.id} className={"kt-row " + (isGroup ? "kt-grp" : "kt-item" + (child ? " child" : ""))}>
                  <div className={"kt-cell-head" + (showNote ? " has-note" : "")}>
                    {isGroup ? (
                      <React.Fragment>
                        {!printing && (
                          <button type="button" className="kt-caret" onClick={() => patch(r.id, "collapsed", !r.collapsed)}
                            title={r.collapsed ? "開く" : "たたむ"}>{r.collapsed ? "▶" : "▼"}</button>
                        )}
                        {printing
                          ? <div className="kt-gname-s">{r.name}</div>
                          : <input className="kt-gname" value={r.name} onChange={e => patch(r.id, "name", e.target.value)} />}
                        {sm && sm.n > 0 && <span className="kt-count-badge">{sm.n}</span>}
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        {!printing
                          ? <button type="button" className="kt-dot" style={{ background: r.color }} onClick={() => cycle(r)} title="色を変える"></button>
                          : <span className="kt-dot" style={{ background: r.color }}></span>}
                        <div className="kt-headinner">
                          {printing ? (
                            <div className="kt-itemname-s">{r.name}</div>
                          ) : (
                            <React.Fragment>
                              <input className="kt-itemname" value={r.name} onChange={e => patch(r.id, "name", e.target.value)} />
                              <div className="kt-itemdates">
                                <input type="date" value={r.start} onChange={e => patch(r.id, "start", e.target.value)} />
                                <input type="date" value={r.end} onChange={e => patch(r.id, "end", e.target.value)} />
                              </div>
                            </React.Fragment>
                          )}
                        </div>
                      </React.Fragment>
                    )}

                    {!printing && (
                      <div className="kt-tools">
                        <button type="button" className="kt-tool" onClick={() => move(r.id, -1)} title="上へ">▲</button>
                        <button type="button" className="kt-tool" onClick={() => move(r.id, 1)} title="下へ">▼</button>
                        <button type="button" className="kt-tool del" onClick={() => remove(r.id)} title="削除">×</button>
                      </div>
                    )}
                  </div>

                  {showNote && (
                    <div className="kt-cell-note">
                      {printing
                        ? <div className="kt-note-s">{r.note || ""}</div>
                        : <textarea className="kt-note" rows="2" placeholder="備考" value={r.note || ""}
                            onChange={e => patch(r.id, "note", e.target.value)} />}
                    </div>
                  )}

                  <div className="kt-track">
                    {days.map(x => <div key={x.s} className={"kt-tick" + (x.dow === 0 ? " sun" : x.dow === 6 ? " sat" : "")} />)}
                    {b && isGroup && (
                      <div className="kt-gbar" style={{ left: b.left, width: Math.max(b.width, 10) }}>
                        <span>{b.len}日</span>
                      </div>
                    )}
                    {b && !isGroup && (
                      <div className={"kt-bar" + (b.cutL ? " cutl" : "") + (b.cutR ? " cutr" : "")}
                        style={{ left: b.left, width: Math.max(b.width, 8), background: r.color }} title={r.note || ""}>
                        <span>{b.len}日</span>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}

            {rows.length === 0 && (
              <div className="kt-empty">
                まず「大枠(工種)」を追加し、その下に「詳細項目」を足していきます。大枠には自動でまとめ線が引かれ、詳細項目には色付きラインが引かれます。大枠を使わず詳細項目だけ並べることもできます。
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="kt-pdfset">
        <span>PDFの表示範囲</span>
        <select value={range.mode} onChange={e => setRange(Object.assign({}, range, { mode: e.target.value }))}>
          <option value="auto">自動(1週間なら週・1か月なら月)</option>
          <option value="week">週間工程</option>
          <option value="month">月間工程</option>
          <option value="custom">期間を指定</option>
          <option value="full">工期全体</option>
        </select>

        {range.mode === "week" && (
          <label>週の起点
            <input type="date" value={range.week || mondayOf(tMin)}
              onChange={e => setRange(Object.assign({}, range, { week: e.target.value }))} />
          </label>
        )}
        {range.mode === "month" && (
          <label>対象の月
            <input type="month" value={range.month || tMin.slice(0,7)}
              onChange={e => setRange(Object.assign({}, range, { month: e.target.value }))} />
          </label>
        )}
        {range.mode === "custom" && (
          <React.Fragment>
            <input type="date" value={range.from || tMin}
              onChange={e => setRange(Object.assign({}, range, { from: e.target.value }))} />
            <span className="kt-tilde">〜</span>
            <input type="date" value={range.to || tMax}
              onChange={e => setRange(Object.assign({}, range, { to: e.target.value }))} />
          </React.Fragment>
        )}

        <span className="kt-range">
          {view.from} 〜 {view.to}({diff(view.from, view.to) + 1}日)
        </span>
      </div>

      <footer className="kt-foot">
        <span className="kt-count">大枠 {groups.length} / 詳細 {tasks.length}</span>
        <button type="button" className="kt-pdf" onClick={exportPDF} disabled={!rows.length || !!busy}>{busy || "PDFで書き出す"}</button>
        <div className="kt-toggles">
          <label className="kt-toggle">
            <input type="checkbox" checked={showNote} onChange={e => setShowNote(e.target.checked)} />備考欄
          </label>
          <label className="kt-toggle">
            <input type="checkbox" checked={show.company} onChange={e => setShow(Object.assign({}, show, { company: e.target.checked }))} />作成会社
          </label>
          <label className="kt-toggle">
            <input type="checkbox" checked={show.author} onChange={e => setShow(Object.assign({}, show, { author: e.target.checked }))} />作成者
          </label>
          <label className="kt-toggle">
            <input type="checkbox" checked={show.date} onChange={e => setShow(Object.assign({}, show, { date: e.target.checked }))} />作成日
          </label>
        </div>
        <button type="button" className="kt-link" onClick={fitPeriod} disabled={!tasks.length}>工期を項目に合わせる</button>
        <button type="button" className="kt-link" onClick={exportJSON} disabled={!rows.length}>データを書き出す</button>
        <button type="button" className="kt-link" onClick={() => fileRef.current.click()}>データを読み込む</button>
        <input type="file" accept="application/json" ref={fileRef} onChange={importJSON} style={{ display:"none" }} />
        <button type="button" className="kt-link danger" onClick={clearAll} disabled={!rows.length}>すべて削除</button>
        <span className="kt-status">{status}</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KouteiHyou />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
